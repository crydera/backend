spring:
  application:
    name: crydera-core
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${CORE_DB_URL:jdbc:postgresql://localhost:26257/crydera_core?sslmode=disable}
    username: ${CORE_DB_USER:crydera}
    password: ${CORE_DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9094}
    consumer:
      group-id: crydera-core
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all

server:
  port: ${SERVER_PORT:8088}
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    displayRequestDuration: true
    tryItOutEnabled: true
  default-produces-media-type: application/json

crydera:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-dev-secret-change-me}
    ttl-minutes: ${JWT_TTL_MINUTES:120}
  invoice:
    public-base-url: ${INVOICE_BASE_URL:http://localhost:5173}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  openapi:
    public-url: ${OPENAPI_PUBLIC_URL:http://localhost:8088}

grpc:
  client:
    tron-sidecar:
      address: ${TRON_SIDECAR_GRPC:static://localhost:50051}
      negotiationType: plaintext
      enableKeepAlive: true
      keepAliveWithoutCalls: true

logging:
  level:
    com.crydera: DEBUG
    org.springframework.web.servlet.HandlerMapping.Mappings: INFO
    org.hibernate.SQL: WARN
